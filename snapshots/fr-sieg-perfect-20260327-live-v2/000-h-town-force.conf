server {
  listen 80;
  listen [::]:80;
  server_name h-town.duckdns.org;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name h-town.duckdns.org;

  ssl_certificate /etc/letsencrypt/live/h-town.duckdns.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/h-town.duckdns.org/privkey.pem;

  root /var/www/h-town-duckdns;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; media-src 'self' https://cdn.pixabay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' https://challenges.cloudflare.com; connect-src 'self' https: https://challenges.cloudflare.com; frame-src 'self' https://www.google.com https://maps.google.com https://challenges.cloudflare.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  gzip on;
  gzip_vary on;
  gzip_min_length 512;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;


  location = /login { return 301 /fifa/; }
  location = /logout { return 301 /fifa/; }
  location = /fifa { return 301 /fifa/; }

  location ^~ /fifa/ {
    alias /var/www/h-town-duckdns/fifa/;
    try_files $uri $uri/ /index.html;
  }



  location ^~ /api/siggi/ {
    proxy_pass http://127.0.0.1:3330/api/siggi/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    access_log off;
  }

  location = /health {
    proxy_pass http://127.0.0.1:3330/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    access_log off;
  }

  location ^~ /api/ { return 404; }

  location = /fr-sieg { return 301 /fr-sieg/v2/; }
  location = /fr-sieg/unternehmen { expires 10m; try_files /fr-sieg/unternehmen/index.html =404; }
  location = /fr-sieg/kontakt { expires 10m; try_files /fr-sieg/kontakt/index.html =404; }
  location = /fr-sieg/impressum { expires 10m; try_files /fr-sieg/impressum/index.html =404; }
  location = /fr-sieg/datenschutz { expires 10m; try_files /fr-sieg/datenschutz/index.html =404; }
  location = /fr-sieg/choose { expires 10m; try_files /fr-sieg/choose/index.html =404; }
  location = /fr-sieg/version-1 { expires 10m; try_files /fr-sieg/version-1/index.html =404; }
  location = /fr-sieg/version-2 { expires 10m; try_files /fr-sieg/version-2/index.html =404; }
  location = /fr-sieg/audits { expires 10m; try_files /fr-sieg/audits/index.html =404; }

  location = /fr-sieg/ { return 301 /fr-sieg/v2/; }
  location = /fr-sieg/choose/ { expires 10m; try_files /fr-sieg/choose/index.html =404; }
  location = /fr-sieg/version-1/ { expires 10m; try_files /fr-sieg/version-1/index.html =404; }
  location = /fr-sieg/version-2/ { expires 10m; try_files /fr-sieg/version-2/index.html =404; }
  location = /fr-sieg/audits/ { expires 10m; try_files /fr-sieg/audits/index.html =404; }


  location ^~ /fr-sieg/assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }





  location /fr-sieg/api/ {
    proxy_pass http://127.0.0.1:3320/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    access_log off;
  }

  location /terminal-chat/api/ {
    proxy_pass http://127.0.0.1:3310;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    access_log off;
  }

  location /terminal-chat/ {
    proxy_pass http://127.0.0.1:3310;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    access_log off;
  }



  location = /fr-sieg/v2 {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    try_files /fr-sieg/v2/index.html =404;
  }

  location = /fr-sieg/v2/ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    try_files /fr-sieg/v2/index.html =404;
  }

  location ~* ^/fr-sieg/v2/.+\.(css|js)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    try_files $uri =404;
  }

  location ^~ /fr-sieg/v2/ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    try_files $uri $uri/ /fr-sieg/v2/index.html;
  }

  location ^~ /fr-sieg/ {
    expires 10m;
    try_files $uri $uri/ /fr-sieg/index.html;
  }

  location = /playmobil { return 301 /playmobil/; }

  location ^~ /playmobil/assets/ {
    root /var/www/h-town-duckdns;
    expires 30d;
    add_header Cache-Control public,max-age=2592000,immutable;
    try_files $uri =404;
  }

  location ^~ /playmobil/ {
    root /var/www/h-town-duckdns;
    add_header Cache-Control no-store;
    try_files $uri $uri/ /playmobil/index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
